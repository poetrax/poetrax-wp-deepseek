name: Deploy to poetrax.online (Reg.ru)

on:
  push:
    branches: [ main ]
    paths:
      - 'wp-content/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      
      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST_DEEPSEEK }}
          FTP_USER: ${{ secrets.FTP_USER_DEEPSEEK }}
          FTP_PASS: ${{ secrets.FTP_PASS_DEEPSEEK }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH_DEEPSEEK }}
        run: |
          lftp -c "set ftp:ssl-force false;
                   set ftp:ssl-protect-data false;
                   set ssl:verify-certificate false;
                   open -u $FTP_USER,$FTP_PASS $FTP_HOST; 
                   mirror -R --delete --verbose ./wp-content/ $REMOTE_PATH/wp-content/"