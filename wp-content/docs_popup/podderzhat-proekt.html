<script>
function drowUserContact(){
    // Получаем элементы
    let user_first_name_el = document.getElementById('user_first_name');
    let user_last_name_el = document.getElementById('user_last_name');
    let user_display_name_el = document.getElementById('user_display_name');
    let user_email_el = document.getElementById('user_email');
    let user_phone_el = document.getElementById('user_phone');

    // Получаем значения
    let user_first_name = user_first_name_el ? user_first_name_el.value : '';
    let user_last_name = user_last_name_el ? user_last_name_el.value : '';
    let user_display_name = user_display_name_el ? user_display_name_el.value : '';
    let user_email = user_email_el ? user_email_el.value : '';
    let user_phone = user_phone_el ? user_phone_el.value : '';

    // Формируем полное имя
    let user_name = '';
    if (user_first_name !== '' && user_last_name !== ''){
        user_name = user_first_name + ' ' + user_last_name;
    }
    else if (user_first_name !== '') {
        user_name = user_first_name;
    }
    else if (user_last_name !== '') {
        user_name = user_last_name;
    }
    else if (user_display_name !== '') {
        user_name = user_display_name;
    }

    // Формируем HTML
    let divCntct = `
    <div class="ym-customer-info">
        <div class="ym-block-title ym-display-none">О покупателе</div>
        <input name="cps_email" class="ym-input" placeholder="Email" type="text" value="${user_email}">
        <input name="cps_phone" class="ym-input" placeholder="Телефон" type="text" value="${user_phone}">
        <input name="custName" class="ym-input" placeholder="ФИО" type="text" value="${user_name}">
        <textarea class="ym-textarea" name="orderDetails" placeholder="Комментарий"></textarea>
    </div>
    `;

    // Вставляем в DOM
    let dUserContact = document.getElementById('dUserContact');
    if (dUserContact) {
        dUserContact.innerHTML = divCntct;
    }
}
document.addEventListener('DOMContentLoaded', function() {
    drowUserContact();
});
</script>
