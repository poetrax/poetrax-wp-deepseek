<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        .error {
            color: red;
            font-size: 14px;
        }

        .success {
            color: green;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input.error {
            border-color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Регистрация</h2>

        <form id="registerForm">
            <div class="form-group">
                <label>Имя пользователя:</label>
                <input type="text" name="user_login" required>
                <div class="error" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label>Email:</label>
                <input type="email" name="user_email" required>
                <div class="error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label>Пароль:</label>
                <input type="password" name="user_pass" required>
                <div class="error" id="passwordError"></div>
                <small>Минимум 8 символов, заглавные и строчные буквы, цифры, спецсимволы</small>
            </div>

            <div class="form-group">
                <label>Подтвердите пароль:</label>
                <input type="password" name="confirmPassword" required>
                <div class="error" id="confirmPasswordError"></div>
            </div>

            <div class="error" id="generalError"></div>
            <div class="success" id="successMessage"></div>

            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Очищаем ошибки
            clearErrors();

            const formData = new FormData(this);
            const data = {
                username: formData.get('username'),
                email: formData.get('email'),
                password: formData.get('password'),
                confirmPassword: formData.get('confirmPassword')
            };

            try {
                const response = await fetch('register.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    showSuccess('Регистрация успешна!');
                    // Перенаправляем или очищаем форму
                    this.reset();
                } else {
                    showErrors(result.errors);
                }

            } catch (error) {
                showError('generalError', 'Ошибка сети');
            }
        });

        function showErrors(errors) {
            for (const [field, message] of Object.entries(errors)) {
                showError(field + 'Error', message);
            }
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            if (element) {
                element.textContent = message;
            }
        }

        function showSuccess(message) {
            document.getElementById('successMessage').textContent = message;
        }

        function clearErrors() {
            const errorElements = document.querySelectorAll('.error');
            errorElements.forEach(el => el.textContent = '');
            document.getElementById('successMessage').textContent = '';
        }

        // Валидация в реальном времени
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('blur', function() {
                validateField(this.name, this.value);
            });
        });

        function validateField(fieldName, value) {
            // Простая клиентская валидация
            switch (fieldName) {
                case 'username':
                    if (value.length < 3) {
                        showError('usernameError', 'Минимум 3 символа');
                    }
                    break;
                case 'email':
                    if (!value.includes('@')) {
                        showError('emailError', 'Неверный формат email');
                    }
                    break;
                case 'password':
                    if (value.length < 8) {
                        showError('passwordError', 'Минимум 8 символов');
                    }
                    break;
            }
        }
    </script>
</body>
</html>
