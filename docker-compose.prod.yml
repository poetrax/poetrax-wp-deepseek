version: '3.8'

services:
  app:
    build: .
    container_name: poetrax_prod_app
    restart: always
    ports:
      - "80:80"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - uploads_data:/var/www/html/wp-content/uploads
    networks:
      - poetrax_prod_network
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: poetrax_prod_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - poetrax_prod_network

networks:
  poetrax_prod_network:
    driver: bridge

volumes:
  db_data:
  uploads_data: