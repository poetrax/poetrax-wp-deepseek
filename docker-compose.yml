version: '3.8'

services:
  mysql-claude:
    image: mysql:8
    container_name: poetrax_claude_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${CLAUDE_DB_NAME}
      MYSQL_USER: ${CLAUDE_DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "${CLAUDE_MYSQL_PORT}:3306"
    volumes:
      - mysql_claude_data:/var/lib/mysql
    networks:
      - poetrax_network

  mysql-deepseek:
    image: mysql:8
    container_name: poetrax_deepseek_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DEEPSEEK_DB_NAME}
      MYSQL_USER: ${DEEPSEEK_DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "${DEEPSEEK_MYSQL_PORT}:3306"
    volumes:
      - mysql_deepseek_data:/var/lib/mysql
    networks:
      - poetrax_network

  phpmyadmin-claude:
    image: phpmyadmin/phpmyadmin
    container_name: poetrax_claude_pma
    restart: unless-stopped
    ports:
      - "${CLAUDE_PMA_PORT}:80"
    environment:
      PMA_HOST: mysql-claude
      PMA_USER: ${CLAUDE_DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - mysql-claude
    networks:
      - poetrax_network

  phpmyadmin-deepseek:
    image: phpmyadmin/phpmyadmin
    container_name: poetrax_deepseek_pma
    restart: unless-stopped
    ports:
      - "${DEEPSEEK_PMA_PORT}:80"
    environment:
      PMA_HOST: mysql-deepseek
      PMA_USER: ${DEEPSEEK_DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - mysql-deepseek
    networks:
      - poetrax_network

  php-app:
    build: .
    container_name: poetrax_deepseek_wp
    restart: unless-stopped
    ports:
      - "8086:80"
    volumes:
      - .:/var/www/html
    networks:
      - poetrax_network
    depends_on:
      - mysql-deepseek
    environment:
      DB_HOST: mysql-deepseek
      DB_NAME: ${DEEPSEEK_DB_NAME}
      DB_USER: ${DEEPSEEK_DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

networks:
  poetrax_network:
    driver: bridge

volumes:
  mysql_claude_data:
  mysql_deepseek_data: